image:
  repository: otel/opentelemetry-collector-k8s
  tag: latest

mode: deployment

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch:
      send_batch_size: 1024
      timeout: 10s
    attributes:
      actions:
        - action: insert
          key: loki.attribute.labels
          value: namespace,container,pod,level,traceId
        - action: insert
          key: loki.format
          value: raw

  exporters:
    debug:
      verbosity: detailed
    otlphttp:
      endpoint: http://tempo:4318
  service:
    pipelines:
      logs:
        receivers: [otlp]
        processors: [attributes]
        exporters: [debug]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]