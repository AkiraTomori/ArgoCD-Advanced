apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
    targetRevision: HEAD
    path: infrastructure/argocd/bootstrap
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
