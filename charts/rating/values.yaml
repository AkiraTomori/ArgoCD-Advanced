backend:
  image:
    repository: akiratomori/yas-rating
    tag: latest

  nameOverride: rating
  fullnameOverride: rating
  databaseName: rating
  ingress:
    enabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
