# Default Config
serviceName: "yas-service"
replicaCount: 1

image:
  repository: "AkiraTomori/yas-service"
  tag: "main"

containerPort: 8080

resources:
  limits:
    memory: "512Mi"
    cpu: "500m"
  requests:
    memory: "256Mi"
    cpu: "100m"

readinessPath: "/actuator/health"
initialDelaySeconds: 40
