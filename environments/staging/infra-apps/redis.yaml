apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: yas-staging
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 25.4.1
    helm:
      releaseName: redis
      values: |
        architecture: standalone
        auth:
          enabled: true
          password: redis
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true