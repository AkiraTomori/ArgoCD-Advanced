apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
    targetRevision: HEAD
    path: infrastructure/scripts/postgres/postgresql
    helm:
      valueFiles:
        - ../../../../environments/staging/values-shared.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true