apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: yas-staging
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 7.0.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/infrastructure/scripts/observability/loki.values.yaml
    - repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
