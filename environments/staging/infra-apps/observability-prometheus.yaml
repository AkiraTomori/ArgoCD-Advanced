apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: yas-staging
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 84.1.0
    helm:
      releaseName: prometheus
      values: |
        prometheus:
          prometheusSpec:
            enableRemoteWriteReceiver: true
        grafana:
          adminUser: admin
          adminPassword: admin
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.yas.staging.com
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
