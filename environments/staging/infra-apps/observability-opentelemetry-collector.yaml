apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-opentelemetry-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: yas-staging
  source:
    repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
    targetRevision: HEAD
    path: infrastructure/scripts/observability/opentelemetry
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
