apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-shared-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: yas-dev
  source:
    repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
    targetRevision: HEAD
    path: charts/yas-configuration
    helm:
      valueFiles:
        - ../../environments/dev/values-shared.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-api-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: yas-dev
  source:
    repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
    targetRevision: HEAD
    path: environments/dev/services
    directory:
      include: 'nginx-api-gateway.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: cart
          - service: tax
          - service: order
          - service: product
          - service: media
          - service: rating
          - service: customer
          - service: location
          - service: inventory
          - service: search
          - service: payment
          # - service: payment-paypal
          - service: promotion
          - service: recommendation
          - service: sampledata
          - service: webhook
          - service: storefront-bff
          - service: storefront-ui
          - service: backoffice-bff
          - service: backoffice-ui
          - service: swagger-ui
  template:
    metadata:
      name: yas-dev-{{service}}
      labels:
        app.kubernetes.io/part-of: yas-dev
    spec:
      project: yas-dev
      source:
        repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
        targetRevision: HEAD
        path: charts/{{service}}
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - ../../environments/dev/services/{{service}}.yaml
            - ../../environments/dev/values-shared.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: yas-dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-bootstrap-media
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: yas-dev
  source:
    repoURL: https://github.com/AkiraTomori/ArgoCD-Advanced.git
    targetRevision: HEAD
    path: environments/dev
    directory:
      include: 'bootstrap-media.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true