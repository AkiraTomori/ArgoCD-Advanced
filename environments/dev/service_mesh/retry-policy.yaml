apiVersion: v1
kind: Pod
metadata:
  name: mesh-retry-probe
  namespace: yas-dev
  labels:
    app: mesh-retry-probe
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: python:3.11-alpine
      ports:
        - containerPort: 8080
      command:
        - python
        - -u
        - -c
        - |
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  print(f"REQUEST {self.path}", flush=True)
                  self.send_response(500)
                  self.send_header("Content-Type", "text/plain")
                  self.end_headers()
                  self.wfile.write(b"upstream failure")

              def log_message(self, format, *args):
                  return

          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: v1
kind: Service
metadata:
  name: mesh-retry-probe
  namespace: yas-dev
spec:
  selector:
    app: mesh-retry-probe
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: mesh-retry-probe
  namespace: yas-dev
spec:
  hosts:
    - mesh-retry-probe.yas-dev.svc.cluster.local
  http:
    - route:
        - destination:
            host: mesh-retry-probe.yas-dev.svc.cluster.local
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: gateway-error,connect-failure,refused-stream,5xx
      timeout: 8s
