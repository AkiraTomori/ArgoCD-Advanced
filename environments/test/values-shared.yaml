global:
  environment: test
  domain: yas.test.com

replicas:
  postgresql: 1
  kafka: 1
  zookeeper: 1
  elasticsearch: 1

postgresql:
  host: postgresql.postgres.svc.cluster.local
  secretName: postgresql.credentials
  username: yasadminuser
  password: admin
  volumeSize: 1Gi
  postgresqlVersion: "15"
  maxConnections: "100"

kafka:
  zookeeperStoreSize: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

elasticsearch:
  username: yas
  password: LarUmB3A49NTg9YmgW4=

redis:
  architecture: standalone
  auth:
    enabled: true
    password: redis

keycloak:
  bootstrapAdmin:
    username: admin
    password: admin
  hostname: identity.yas.test.com
  backofficeRedirectUrl: http://backoffice.yas.test.com
  storefrontRedirectUrl: http://storefront.yas.test.com

applicationConfig:
  spring:
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://identity.yas.test.com/realms/Yas
  springdoc:
    oauthflow:
      authorization-url: http://identity.yas.test.com/realms/Yas/protocol/openid-connect/auth
      token-url: http://identity.yas.test.com/realms/Yas/protocol/openid-connect/token

backofficeBffExtraConfig:
  spring:
    data:
      redis:
        host: redis-master.redis.svc.cluster.local
    security:
      oauth2:
        client:
          provider:
            keycloak:
              issuer-uri: http://identity.yas.test.com/realms/Yas

storefrontBffExtraConfig:
  spring:
    data:
      redis:
        host: redis-master.redis.svc.cluster.local
    security:
      oauth2:
        client:
          provider:
            keycloak:
              issuer-uri: http://identity.yas.test.com/realms/Yas

mediaApplicationConfig:
  yas:
    publicUrl: http://api.yas.test.com/media

customerApplicationConfig:
  keycloak:
    auth-server-url: http://identity.yas.test.com

paymentPaypalApplicationConfig:
  yas:
    public:
      url: http://storefront.yas.test.com/complete-payment

sampledataApplicationConfig:
  spring:
    datasource:
      product:
        url: jdbc:postgresql://postgresql.postgres.svc.cluster.local:5432/product
      media:
        url: jdbc:postgresql://postgresql.postgres.svc.cluster.local:5432/media

backend:
  replicaCount: 1
  databaseConnectionUrl: jdbc:postgresql://postgresql.postgres.svc.cluster.local:5432
  ingress:
    className: nginx
  service:
    type: ClusterIP
  javaOpts: "-Xmx384m -Xms256m"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"